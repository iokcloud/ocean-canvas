<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean Canvas - Deep Sea Studio</title>
  <meta name="description" content="Draw your deep sea creature, let it swim with others in the global ocean. Create, share, vote.">
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
</head>
<body>
  <div class="bubbles-bg" id="bubbles"></div>

  <nav class="nav">
    <a href="index.html" class="nav-logo">OCEAN CANVAS</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link active" data-i18n="nav_draw">Draw</a>
      <a href="ocean.html" class="nav-link" data-i18n="nav_ocean">Ocean</a>
      <a href="rank.html" class="nav-link" data-i18n="nav_rank">Rank</a>
      <span id="global-pool-status" class="global-pool-status" data-state="loading" data-i18n="pool_loading">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <h1 class="section-title" data-i18n="title_draw">Draw Your Deep Sea Creature</h1>
    <p class="section-subtitle" data-i18n="subtitle_draw">Choose a creature, create on canvas, then let it swim into the deep sea</p>

    <div class="creature-selector" id="creature-selector">
      <button class="creature-btn active" data-type="fish">
        <span class="creature-emoji">🐟</span> <span data-i18n="creature_fish">Fish</span>
      </button>
      <button class="creature-btn" data-type="jellyfish">
        <span class="creature-emoji">🪼</span> <span data-i18n="creature_jellyfish">Jellyfish</span>
      </button>
      <button class="creature-btn" data-type="octopus">
        <span class="creature-emoji">🐙</span> <span data-i18n="creature_octopus">Octopus</span>
      </button>
      <button class="creature-btn" data-type="turtle">
        <span class="creature-emoji">🐢</span> <span data-i18n="creature_turtle">Turtle</span>
      </button>
      <button class="creature-btn" data-type="crab">
        <span class="creature-emoji">🦀</span> <span data-i18n="creature_crab">Crab</span>
      </button>
      <button class="creature-btn" data-type="whale">
        <span class="creature-emoji">🐋</span> <span data-i18n="creature_whale">Whale</span>
      </button>
      <button class="creature-btn" data-type="shark">
        <span class="creature-emoji">🦈</span> <span data-i18n="creature_shark">Shark</span>
      </button>
      <button class="creature-btn" data-type="seahorse">
        <span class="creature-emoji">🌊</span> <span data-i18n="creature_seahorse">Seahorse</span>
      </button>
    </div>

    <div class="canvas-container">
      <div class="draw-canvas-wrapper">
        <canvas id="draw-canvas" width="480" height="280"></canvas>
      </div>

      <div class="toolbar">
        <div class="toolbar-group">
          <button class="tool-btn active" id="brush-tool" data-i18n-title="tool_brush" title="Brush">✏️</button>
          <button class="tool-btn" id="eraser-tool" data-i18n-title="tool_eraser" title="Eraser">🧹</button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
          <div class="color-picker-wrapper">
            <input type="color" id="color-picker" value="#00e5ff" title="Color">
          </div>
          <button class="tool-btn" data-color="#00e5ff" style="color:#00e5ff" title="Cyan">●</button>
          <button class="tool-btn" data-color="#ff00ff" style="color:#ff00ff" title="Magenta">●</button>
          <button class="tool-btn" data-color="#00ff88" style="color:#00ff88" title="Green">●</button>
          <button class="tool-btn" data-color="#ffd700" style="color:#ffd700" title="Gold">●</button>
          <button class="tool-btn" data-color="#ff6b6b" style="color:#ff6b6b" title="Red">●</button>
          <button class="tool-btn" data-color="#ffffff" style="color:#ffffff" title="White">●</button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
          <span style="color:var(--text-muted);font-size:0.7rem" data-i18n="tool_size">Size</span>
          <input type="range" class="size-slider" id="brush-size" min="1" max="30" value="4">
          <span id="size-label" style="color:var(--text-secondary);font-size:0.7rem">4</span>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
          <button class="tool-btn" id="undo-btn" data-i18n-title="tool_undo" title="Undo">↩</button>
          <button class="tool-btn" id="clear-btn" data-i18n-title="tool_clear" title="Clear">🗑</button>
        </div>
      </div>

      <p class="hint-text" id="hint-text" data-i18n="hint_draw">💡 Drawing facing right works best | Score 60%+ to release to ocean</p>
      <div id="ai-score-display" style="text-align:center;margin-top:4px;font-size:0.8rem;min-height:20px;transition:all 0.3s ease"></div>


      <div class="action-buttons">
        <button class="btn-primary" id="swim-btn" disabled style="opacity:0.4;cursor:not-allowed" data-i18n="btn_swim">Release to Ocean 🌊</button>
        <a href="ocean.html" class="btn-secondary" data-i18n="btn_ocean">Enter Ocean</a>
        <a href="rank.html" class="btn-secondary" data-i18n="btn_rank">View Rankings</a>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="src/js/i18n.js"></script>
  <script>I18n.init();</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="src/js/supabase-config.js"></script>
  <script src="src/js/storage.js"></script>
  <script src="src/js/supabase-db.js"></script>
  <script src="src/js/global-pool.js"></script>
  <script>
    if (typeof SupabaseDB !== 'undefined') SupabaseDB.init();
    if (typeof GlobalPool !== 'undefined') {
      GlobalPool.init();
      if (GlobalPool.isEnabled()) {
        GlobalPool.fetch('recent').catch(() => GlobalPool.renderStatusBadgeDisconnected());
      } else {
        GlobalPool.renderStatusBadgeDisconnected();
      }
    }
  </script>
  <script src="src/js/auth.js"></script>
  <script>if(typeof OceanAuth!=='undefined')OceanAuth.init();</script>
  <script src="src/js/share.js"></script>
  <script src="src/js/daily-challenge.js"></script>
  <script>if(typeof DailyChallenge!=='undefined')DailyChallenge.init();</script>
  <script src="src/js/achievement.js"></script>
  <script>if(typeof AchievementSystem!=='undefined')AchievementSystem.init();</script>
  <script src="src/js/deco-shop.js"></script>
  <script>if(typeof DecoShop!=='undefined')DecoShop.init();DecoShop.renderShopButton();</script>
  <script src="src/js/local-ai.js"></script>
  <script src="src/js/draw.js"></script>
  <script src="src/js/bubbles.js"></script>
  <script src="src/js/analytics.js"></script>
  <script src="src/js/autoflow/memory.js"></script>
  <script src="src/js/autoflow/audit-engine.js"></script>
  <script src="src/js/autoflow/core.js"></script>
  <script src="src/js/autoflow/scheduler.js"></script>
  <script>if(typeof AutoFlow!=='undefined')AutoFlow.init();</script>
</body>
</html>
