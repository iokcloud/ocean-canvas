<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean View - Ocean Canvas</title>
  <meta name="description" content="Watch all deep sea creatures swim freely in the ocean">
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">OCEAN CANVAS</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link" data-i18n="nav_draw">Draw</a>
      <a href="ocean.html" class="nav-link active" data-i18n="nav_ocean">Ocean</a>
      <a href="rank.html" class="nav-link" data-i18n="nav_rank">Rank</a>
      <span id="global-pool-status" class="global-pool-status" data-state="loading" data-i18n="pool_loading">Connecting...</span>
      <div class="nav-actions" id="nav-actions"></div>
    </div>
  </nav>

  <main class="main-content" style="padding-top:0">
    <div class="tank-canvas-wrapper">
      <canvas id="ocean-canvas"></canvas>

      <div class="stats-overlay" id="stats-overlay">
        <span data-i18n="ocean_count_label">Creatures</span>: <span class="stat-value" id="creature-count">0</span><br>
        <span data-i18n="ocean_pool_label">Pool</span>: <span class="stat-value" data-i18n="pool_global">Global</span><br>
        <span data-i18n="ocean_depth">Depth</span>: <span class="stat-value">3800m</span>
      </div>

      <div class="tank-controls">
        <label data-i18n="ocean_sort">Sort</label>:
        <select id="tank-sort">
          <option value="recent" data-i18n="ocean_sort_recent">Recent</option>
          <option value="popular" data-i18n="ocean_sort_popular">Popular</option>
          <option value="random" data-i18n="ocean_sort_random">Random</option>
        </select>
        <button id="refresh-tank" data-i18n="ocean_refresh">Refresh</button>
        <button id="feed-btn" data-i18n="ocean_feed">Feed 🍞</button>
        <label>
          <input type="checkbox" id="show-bubbles" checked> <span data-i18n="ocean_bubbles">Bubbles</span>
        </label>
        <a href="index.html" style="color:var(--neon-cyan);font-size:0.75rem;text-decoration:none" data-i18n="ocean_go_draw">Go Draw</a>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="src/js/i18n.js"></script>
  <script>I18n.init();</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="src/js/supabase-config.js"></script>
  <script src="src/js/storage.js"></script>
  <script src="src/js/supabase-db.js"></script>
  <script src="src/js/global-pool.js"></script>
  <script src="src/js/boot.js"></script>
  <script src="src/js/auth.js"></script>
  <script src="src/js/share.js"></script>
  <script src="src/js/ocean.js"></script>
  <script src="src/js/bubbles.js"></script>
  <script src="src/js/analytics.js"></script>
  <script>OceanBoot.initPage({ achievement: false, deco: false });</script>
</body>
</html>
