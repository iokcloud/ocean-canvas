<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>深海观赏 - Ocean Canvas</title>
  <meta name="description" content="观赏所有深海生物在海洋中自由游动">
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">OCEAN CANVAS</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">绘制</a>
      <a href="ocean.html" class="nav-link active">深海</a>
      <a href="rank.html" class="nav-link">排行</a>
    </div>
  </nav>

  <main class="main-content" style="padding-top:0">
    <div class="tank-canvas-wrapper">
      <canvas id="ocean-canvas"></canvas>

      <div class="stats-overlay" id="stats-overlay">
        生物数量: <span class="stat-value" id="creature-count">0</span><br>
        深海深度: <span class="stat-value">3800m</span>
      </div>

      <div class="tank-controls">
        <label>排序:</label>
        <select id="tank-sort">
          <option value="recent">最新</option>
          <option value="popular">最热</option>
          <option value="random">随机</option>
        </select>
        <button id="refresh-tank">刷新</button>
        <button id="feed-btn">投放食物 🍞</button>
        <label>
          <input type="checkbox" id="show-bubbles" checked> 气泡
        </label>
        <a href="index.html" style="color:var(--neon-cyan);font-size:0.75rem;text-decoration:none">去绘制</a>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="src/js/supabase-config.js"></script>
  <script src="src/js/storage.js"></script>
  <script src="src/js/supabase-db.js"></script>
  <script>if(typeof SupabaseDB!=='undefined')SupabaseDB.init();</script>
  <script src="src/js/auth.js"></script>
  <script>if(typeof OceanAuth!=='undefined')OceanAuth.init();</script>
  <script src="src/js/share.js"></script>
  <script src="src/js/ocean.js"></script>
  <script src="src/js/analytics.js"></script>
  <script src="src/js/autoflow/memory.js"></script>
  <script src="src/js/autoflow/audit-engine.js"></script>
  <script src="src/js/autoflow/core.js"></script>
  <script src="src/js/autoflow/scheduler.js"></script>
  <script>if(typeof AutoFlow!=='undefined')AutoFlow.init();</script>
</body>
</html>
